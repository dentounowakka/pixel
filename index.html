<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#d32f2f">
    <meta name="description" content="2枚の画像を重ねて、ピクセル距離と実寸(mm)を測定できるPWA対応ツールです。">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/icon-192.svg">
    <title>ピクセル・実寸(mm)距離測定ツール（2枚重ね版）</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f5f5f5;
        }
        .toolbar {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .file-inputs {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 6px;
        }
        .file-inputs label {
            font-size: 12px;
            font-weight: bold;
            color: #444;
        }
        button, input, select {
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
        }
        button:hover {
            background: #eee;
        }
        button.active {
            background: #d32f2f;
            color: white;
            border-color: #d32f2f;
        }
        .scale-config {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #e3f2fd;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .result {
            font-size: 18px;
            font-weight: bold;
            color: #d32f2f;
            margin-left: auto; /* 右寄せ */
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .status-msg {
            font-size: 12px;
            color: #666;
            font-weight: normal;
        }
        .canvas-container {
            width: 100%;
            height: 70vh;
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            overflow: auto; /* 画像が大きい場合はスクロールバーを表示 */
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        canvas {
            transform-origin: top left;
            cursor: crosshair;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .opacity-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #fff8e1;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
        }
        .opacity-controls input[type="range"] {
            width: 120px;
            vertical-align: middle;
        }
        .help-panel {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            color: #555;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 15px;
            padding: 10px 14px;
        }
        .help-panel strong {
            color: #d32f2f;
        }
        .canvas-container.dragover {
            outline: 4px solid rgba(211, 47, 47, 0.35);
            outline-offset: -4px;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="file-inputs">
            <div>
                <label for="imageLoader1">画像1:</label>
                <input type="file" id="imageLoader1" accept="image/*">
            </div>
            <div>
                <label for="imageLoader2">画像2:</label>
                <input type="file" id="imageLoader2" accept="image/*">
            </div>
        </div>
        
        <div class="control-group">
            <button id="zoomOut">➖ 縮小</button>
            <span id="zoomLevel" style="margin: 0 10px;">100%</span>
            <button id="zoomIn">➕ 拡大</button>
            <button id="fitToScreen">画面に合わせる</button>
            <button id="resetZoom">100%</button>
        </div>

        <div class="opacity-controls">
            <label>画像1 濃度 <input type="range" id="opacity1" min="0" max="100" value="50"> <span id="opacity1Value">50%</span></label>
            <label>画像2 濃度 <input type="range" id="opacity2" min="0" max="100" value="50"> <span id="opacity2Value">50%</span></label>
        </div>

        <div class="scale-config">
            <span>基準の長さ:</span>
            <input type="number" id="knownDistance" value="50" style="width: 60px; padding: 6px;">
            <span>mm</span>
            <button id="btnSetScale">📐 基準線を登録</button>
        </div>

        <button id="clearPoints">点をクリア</button>
        <button id="undoPoint">1点戻す</button>

        <div class="result">
            <div id="resultDisplay">距離: -</div>
            <div id="statusDisplay" class="status-msg">まずは画像（1枚以上）を読み込んでください</div>
        </div>
    </div>

    <div class="help-panel">
        <strong>使い方:</strong> 画像を選ぶかキャンバスへドラッグ&ドロップ → 必要なら「基準線を登録」 → 測りたい2点をクリック。ショートカット: <strong>+/-</strong> 拡大縮小、<strong>0</strong> 100%、<strong>Esc</strong> 点クリア。
    </div>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imageLoader1 = document.getElementById('imageLoader1');
        const imageLoader2 = document.getElementById('imageLoader2');
        const resultDisplay = document.getElementById('resultDisplay');
        const statusDisplay = document.getElementById('statusDisplay');
        const zoomLevelDisplay = document.getElementById('zoomLevel');
        const btnSetScale = document.getElementById('btnSetScale');
        const knownDistanceInput = document.getElementById('knownDistance');
        const canvasContainer = document.getElementById('canvasContainer');
        const opacity1Input = document.getElementById('opacity1');
        const opacity2Input = document.getElementById('opacity2');
        const opacity1Value = document.getElementById('opacity1Value');
        const opacity2Value = document.getElementById('opacity2Value');

        let img1 = null;
        let img2 = null;
        let points = [];
        let zoom = 1.0;

        // スケール情報 (1mmあたりのピクセル数)
        let pxPerMm = null; 
        let isSettingScaleMode = false; // 基準線登録モードフラグ

        // キャンバスのサイズを画像に合わせてリセット・再描画
        function resetCanvasSize() {
            // 読み込まれている画像のうち、大きい方のサイズにキャンバスを合わせる
            let w = 0, h = 0;
            if (img1) { w = img1.width; h = img1.height; }
            if (img2) { w = Math.max(w, img2.width); h = Math.max(h, img2.height); }

            if (w > 0 && h > 0) {
                canvas.width = w;
                canvas.height = h;
            }
            draw();
        }

        function loadImageFile(file, slot) {
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const image = new Image();
                image.onload = function() {
                    if (slot === 1) img1 = image;
                    if (slot === 2) img2 = image;
                    statusDisplay.textContent = `画像${slot}が読み込まれました。`;
                    resetCanvasSize();
                };
                image.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 画像1の読み込み処理
        imageLoader1.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) {
                img1 = null;
                resetCanvasSize();
                return;
            }
            loadImageFile(file, 1);
        });

        // 画像2の読み込み処理
        imageLoader2.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) {
                img2 = null;
                resetCanvasSize();
                return;
            }
            loadImageFile(file, 2);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            canvasContainer.addEventListener(eventName, function(e) {
                e.preventDefault();
                canvasContainer.classList.add('dragover');
            });
        });
        ['dragleave', 'drop'].forEach(eventName => {
            canvasContainer.addEventListener(eventName, function(e) {
                e.preventDefault();
                canvasContainer.classList.remove('dragover');
            });
        });
        canvasContainer.addEventListener('drop', function(e) {
            Array.from(e.dataTransfer.files).slice(0, 2).forEach((file, index) => loadImageFile(file, index + 1));
        });

        // ズーム機能
        document.getElementById('zoomIn').addEventListener('click', () => {
            zoom += 0.2;
            updateZoomDisplay();
            draw();
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            zoom = Math.max(0.2, zoom - 0.2);
            updateZoomDisplay();
            draw();
        });

        function setZoom(value) {
            zoom = Math.min(8, Math.max(0.1, value));
            updateZoomDisplay();
            draw();
        }

        function updateZoomDisplay() {
            canvas.style.transform = `scale(${zoom})`;
            zoomLevelDisplay.textContent = `${Math.round(zoom * 100)}%`;
        }

        document.getElementById('resetZoom').addEventListener('click', () => setZoom(1));
        document.getElementById('fitToScreen').addEventListener('click', () => {
            if (!canvas.width || !canvas.height) return;
            setZoom(Math.min(canvasContainer.clientWidth / canvas.width, canvasContainer.clientHeight / canvas.height, 1));
        });

        [opacity1Input, opacity2Input].forEach((input, index) => {
            input.addEventListener('input', () => {
                const valueLabel = index === 0 ? opacity1Value : opacity2Value;
                valueLabel.textContent = `${input.value}%`;
                draw();
            });
        });

        // 「基準線を登録」ボタンの挙動
        btnSetScale.addEventListener('click', () => {
            if (!img1 && !img2) return;
            isSettingScaleMode = true;
            points = []; // 新たに2点打ってもらうためにリセット
            btnSetScale.classList.add('active');
            statusDisplay.textContent = "【基準設定モード】実際の長さの2点（円柱の端など）をクリックしてください。";
            draw();
            updateResult();
        });

        // クリックで点を打つ処理
        canvas.addEventListener('mousedown', function(e) {
            if (!img1 && !img2) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / zoom;
            const y = (e.clientY - rect.top) / zoom;

            if (points.length >= 2) {
                points = [];
            }

            points.push({ x: x, y: y });

            // 2点打たれた瞬間のモード判定
            if (points.length === 2 && isSettingScaleMode) {
                const dx = points[1].x - points[0].x;
                const dy = points[1].y - points[0].y;
                const pxDist = Math.sqrt(dx * dx + dy * dy);
                const knownMm = parseFloat(knownDistanceInput.value) || 1.0;
                
                // 1mmあたりのピクセル数を確定
                pxPerMm = pxDist / knownMm; 
                isSettingScaleMode = false;
                btnSetScale.classList.remove('active');
                statusDisplay.textContent = `基準設定完了: ${knownMm}mm = ${pxDist.toFixed(1)}px に固定しました。`;
            } else if (points.length === 2 && !isSettingScaleMode) {
                statusDisplay.textContent = "計測完了。次の2点をクリックすると再計測できます。";
            } else if (points.length === 1) {
                statusDisplay.textContent = isSettingScaleMode ? "基準の2点目をクリックしてください。" : "測定の2点目をクリックしてください。";
            }

            draw();
            updateResult();
        });

        // 点のクリア
        document.getElementById('clearPoints').addEventListener('click', clearPoints);

        document.getElementById('undoPoint').addEventListener('click', () => {
            points.pop();
            draw();
            updateResult();
            statusDisplay.textContent = "最後の点を取り消しました。";
        });

        function clearPoints() {
            points = [];
            draw();
            updateResult();
            if(!isSettingScaleMode) {
                statusDisplay.textContent = "点をクリアしました。";
            }
        }

        document.addEventListener('keydown', (e) => {
            if (['INPUT', 'SELECT'].includes(document.activeElement.tagName)) return;
            if (e.key === '+') setZoom(zoom + 0.2);
            if (e.key === '-') setZoom(zoom - 0.2);
            if (e.key === '0') setZoom(1);
            if (e.key === 'Escape') clearPoints();
        });

        // 描画処理
        function draw() {
            if (!img1 && !img2) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- 画像の重ね合わせ（それぞれ透過度50%） ---
            ctx.save();
            if (img1) {
                ctx.globalAlpha = Number(opacity1Input.value) / 100;
                ctx.drawImage(img1, 0, 0);
            }
            if (img2) {
                ctx.globalAlpha = Number(opacity2Input.value) / 100;
                ctx.drawImage(img2, 0, 0);
            }
            ctx.restore(); // 透過設定を元に戻す（計測線や点に影響させないため）
            // ----------------------------------------

            const pointRadius = 5 / zoom;
            const lineWidth = 2 / zoom;

            // 点を描画（基準モードなら青、計測モードなら赤）
            ctx.fillStyle = isSettingScaleMode ? '#0026ff' : '#ff0000';
            ctx.strokeStyle = isSettingScaleMode ? '#0026ff' : '#ff0000';
            
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, pointRadius, 0, Math.PI * 2);
                ctx.fill();
            });

            // 2点あれば線を引く
            if (points.length === 2) {
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.lineWidth = lineWidth;
                ctx.stroke();
            }
        }

        // 距離の計算と表示
        function updateResult() {
            if (points.length === 2) {
                const dx = points[1].x - points[0].x;
                const dy = points[1].y - points[0].y;
                const pxDistance = Math.sqrt(dx * dx + dy * dy);
                
                if (pxPerMm) {
                    // 基準が設定されていればmm換算も表示
                    const mmDistance = pxDistance / pxPerMm;
                    resultDisplay.innerHTML = `<div>${mmDistance.toFixed(2)} mm</div><div style="font-size:12px; color:#777;">(${pxDistance.toFixed(1)} px)</div>`;
                } else {
                    // 基準がない場合はpxのみ
                    resultDisplay.textContent = `${pxDistance.toFixed(1)} px`;
                }
            } else if (points.length === 1) {
                resultDisplay.textContent = `測定中...`;
            } else {
                resultDisplay.textContent = `-`;
            }
        }


        // PWA: Service Worker登録（表示不具合時はアプリ本体の描画を妨げない）
        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            window.addEventListener('load', async () => {
                try {
                    const registration = await navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' });
                    await registration.update();
                } catch (error) {
                    console.warn('Service Worker registration failed:', error);
                }
            });
        }
    </script>
</body>
</html>
